name: expense_tracker
description: A modern, production-ready expense tracking app built with Flutter, Riverpod, and Hive.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5

  # Routing
  go_router: ^14.6.2

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Platform integrations (used by service stubs)
  image_picker: ^1.1.2
  share_plus: ^10.1.2

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
